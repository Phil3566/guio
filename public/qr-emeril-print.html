<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emeril QR Code — Print Me</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; background: white;
    }
    .print-card { text-align: center; padding: 40px; }
    .print-card img { width: 200px; height: 200px; }
    .print-card h2 { margin: 16px 0 4px; font-size: 18px; }
    .print-card p { color: #666; font-size: 13px; margin: 0; }
    @media print { .print-card img { width: 150px; height: 150px; } }
  </style>
</head>
<body>
  <div class="print-card">
    <img src="qr-emeril.svg" alt="QR Code">
    <h2>Scan for Air Fryer Oven Guide</h2>
    <p>Emeril Lagasse Dual Zone 360</p>
  </div>
</body>
</html>
