<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Font Sampler</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a6b5a;
      color: white;
      padding: 32px 20px;
      font-size: 17px;
      line-height: 2.8;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.6;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
      margin-top: 20px;
    }
    .sample {
      font-size: 20px;
      font-weight: 700;
    }

    /* 1. Gradient */
    .ai-gradient {
      background: linear-gradient(135deg, #f5b731, #ff6fd8, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-size: 22px;
    }

    /* 2. Monospace */
    .ai-mono {
      font-family: "SF Mono", "Menlo", "Courier New", monospace;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 20px;
    }

    /* 3. Outlined */
    .ai-outline {
      -webkit-text-stroke: 1.5px white;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 2px;
    }

    /* 4. Pill badge */
    .ai-pill {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* 5. Glow */
    .ai-glow {
      text-shadow: 0 0 8px rgba(245,183,49,0.8), 0 0 20px rgba(245,183,49,0.4), 0 0 40px rgba(245,183,49,0.2);
      color: #f5e6a3;
      font-weight: 900;
      font-size: 22px;
    }
  </style>
</head>
<body>

  <span class="label">1. Gradient</span>
  <div class="sample">Your <span class="ai-gradient">AI</span> assistant for this microwave.</div>

  <span class="label">2. Monospace</span>
  <div class="sample">Your <span class="ai-mono">AI</span> assistant for this microwave.</div>

  <span class="label">3. Outlined</span>
  <div class="sample">Your <span class="ai-outline">AI</span> assistant for this microwave.</div>

  <span class="label">4. Pill badge</span>
  <div class="sample">Your <span class="ai-pill">AI</span> assistant for this microwave.</div>

  <span class="label">5. Glow</span>
  <div class="sample">Your <span class="ai-glow">AI</span> assistant for this microwave.</div>

</body>
</html>
